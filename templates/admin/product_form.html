{% extends 'admin/base.html' %}
{% block title %}{{ 'Редактировать' if product else 'Добавить' }} товар{% endblock %}
{% block page_title %}{{ 'Редактировать товар' if product else 'Добавить товар' }}{% endblock %}

{% block content %}
<div class="admin-card">
    <div class="admin-card-body">
        <form method="POST" class="admin-form">
            <div class="form-row">
                <div class="form-group">
                    <label>Название *</label>
                    <input type="text" name="name" value="{{ product.name if product else '' }}" required>
                </div>
                
                <div class="form-group">
                    <label>Бренд *</label>
                    <input type="text" name="brand" value="{{ product.brand if product else '' }}" required>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Категория *</label>
                    <select name="category" required>
                        <option value="Лицо" {% if product and product.category == 'Лицо' %}selected{% endif %}>Лицо</option>
                        <option value="Волосы" {% if product and product.category == 'Волосы' %}selected{% endif %}>Волосы</option>
                        <option value="Тело" {% if product and product.category == 'Тело' %}selected{% endif %}>Тело</option>
                        <option value="Макияж" {% if product and product.category == 'Макияж' %}selected{% endif %}>Макияж</option>
                        <option value="Наборы" {% if product and product.category == 'Наборы' %}selected{% endif %}>Наборы</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Изображение *</label>
                    <input type="text" name="image" value="{{ product.image if product else '' }}" placeholder="shiseido_oil.jpg" required>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Цена *</label>
                    <input type="number" name="price" value="{{ product.price if product else '' }}" step="0.01" required>
                </div>
                
                <div class="form-group">
                    <label>Старая цена</label>
                    <input type="number" name="old_price" value="{{ product.old_price if product else '' }}" step="0.01">
                </div>
            </div>
            
            <div class="form-group">
                <label>Описание</label>
                <textarea name="description" rows="3">{{ product.description if product else '' }}</textarea>
            </div>
            
            <div class="form-group">
                <label>Состав</label>
                <textarea name="composition" rows="3">{{ product.composition if product else '' }}</textarea>
            </div>
            
            <div class="form-group">
                <label>Применение</label>
                <textarea name="usage" rows="3">{{ product.usage if product else '' }}</textarea>
            </div>
            
            <div class="form-group checkbox-group">
                <label>
                    <input type="checkbox" name="in_stock" {% if not product or product.in_stock %}checked{% endif %}>
                    В наличии
                </label>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn-primary">Сохранить</button>
                <a href="{{ url_for('admin_products') }}" class="btn-outline">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
